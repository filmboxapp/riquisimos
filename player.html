<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>FILMBOX</title>

<script src="https://content.jwplatform.com/libraries/KB5zFt7A.js"></script>

<style>

body{
margin:0;
background:black;
font-family:Arial;
}

#player{
width:100%;
height:100vh;
}

.top{

position:absolute;
z-index:999;

top:15px;
left:15px;

color:white;
}

.brand{
color:#e50914;
font-weight:bold;
}

.title{
font-size:22px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="top">

<div class="brand">
Estas viendo FILMBOX
</div>

<div id="movieTitle"
class="title"></div>

</div>

<div id="player"></div>

<script>

const params =
new URLSearchParams(location.search);

const title =
params.get("title");

const poster =
params.get("poster");

const video =
params.get("video");

document.getElementById(
"movieTitle"
).innerText = title;

jwplayer("player").setup({

file:video,

image:poster,

autostart:false,

width:"100%",

height:"100%"

});

</script>

</body>
</html>
