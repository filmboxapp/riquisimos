<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FILMBOX PLAYER GENERATOR</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>FILMBOX PLAYER GENERATOR</h1>

<div class="tabs">
<button onclick="setMode('tmdb')">Buscar TMDB</button>
<button onclick="setMode('manual')">Manual</button>
</div>

<div id="tmdb-mode">

<input
type="text"
id="search"
placeholder="Buscar película o serie">

<div id="results"></div>

<input
type="text"
id="video-url"
placeholder="URL del video">

</div>

<div id="manual-mode" style="display:none">

<input id="title" placeholder="Título">

<input id="poster" placeholder="Poster URL">

<input id="backdrop" placeholder="Backdrop URL">

<input id="manual-video" placeholder="Video URL">

</div>

<button onclick="generateLink()">
GENERAR LINK
</button>

<div id="output"></div>

</div>

<script src="app.js"></script>

</body>
</html>
