<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FILMBOX Generator</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>FILMBOX PLAYER GENERATOR</h1>

<div class="tabs">
<button onclick="setMode('tmdb')">TMDB</button>
<button onclick="setMode('manual')">Manual</button>
</div>

<div id="tmdb-mode">

<input id="tmdb-id"
placeholder="ID TMDB">

<input id="video-url"
placeholder="URL Video">

</div>

<div id="manual-mode">

<input id="title"
placeholder="Título">

<input id="poster"
placeholder="Poster URL">

<input id="backdrop"
placeholder="Backdrop URL">

<input id="manual-video"
placeholder="Video URL">

</div>

<button onclick="generateLink()">
GENERAR
</button>

<div id="result"></div>

</div>

<script src="app.js"></script>

</body>
</html>
