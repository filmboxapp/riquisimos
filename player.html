<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>FILMBOX PLAYER</title>

<script src="https://content.jwplatform.com/libraries/KB5zFt7A.js"></script>

<style>

html,
body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
overflow:hidden;
}

#player{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
}

.jwplayer{
width:100vw !important;
height:100vh !important;
}

.info{
position:absolute;
top:10px;
left:10px;
z-index:9999;
}

.brand{
color:#e50914;
font-size:13px;
font-weight:bold;
}

.title{
font-size:32px;
font-weight:bold;
color:white;
}

</style>

</head>

<body>

<div class="info">

<div class="brand">
Estas viendo FILMBOX
</div>

<div id="movieTitle"
class="title">
</div>

</div>

<div id="player"></div>

<script>

const params=
new URLSearchParams(location.search);

const title=params.get("title");
const poster=params.get("poster");
const backdrop=params.get("backdrop");
const video=params.get("video");

document.getElementById("movieTitle").innerText=title;

jwplayer("player").setup({

file:decodeURIComponent(video),

image:decodeURIComponent(backdrop),

width:"100%",

height:"100%",

stretching:"uniform",

controls:true,

autostart:false

});

</script>

</body>
</html>
